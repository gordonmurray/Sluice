# Flagship demo override: meter Firn (multi-tenant vector + full-text search
# on S3) instead of the built-in demo origin. Needs a sibling checkout:
#
#   git clone https://github.com/gordonmurray/firnflow ../firnflow
#   docker compose -f docker-compose.yml -f docker-compose.firn.yml up -d --build
#   docker compose -f docker-compose.yml -f docker-compose.firn.yml run --rm client

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: sluice-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: sluice-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/firnflow
      "

  origin:
    # Overrides the built-in demo origin in place: same service name, so
    # compose swaps what "origin" is instead of running both. The entrypoint
    # must be restated because the base file pins the demo binary.
    build:
      context: ../firnflow
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/firnflow-api"]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      FIRNFLOW_S3_ENDPOINT: http://minio:9000
      FIRNFLOW_S3_ACCESS_KEY: minioadmin
      FIRNFLOW_S3_SECRET_KEY: minioadmin
      FIRNFLOW_S3_BUCKET: firnflow
      FIRNFLOW_BIND: "0.0.0.0:3000"
      RUST_LOG: info

  seed-firn:
    # One-shot: seed the demo namespace with text rows (direct to Firn;
    # admin writes are not exposed through the gateway).
    image: curlimages/curl:latest
    container_name: sluice-seed-firn
    depends_on:
      - origin
    volumes:
      - ./scripts/seed-firn.sh:/seed-firn.sh:ro
      - ./config/seed.json:/seed.json:ro
    entrypoint: ["/bin/sh", "/seed-firn.sh"]
    environment:
      FIRN_URL: http://origin:3000
      NAMESPACE: demo

  client:
    depends_on:
      seed-firn:
        condition: service_completed_successfully

volumes:
  minio-data:
